name: Build MultiDroid APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project
        run: |
          flutter create --org com.multidroid --project-name multidroid /tmp/tempproject
          cp -r /tmp/tempproject/android/gradle android/
          cp -r /tmp/tempproject/android/gradle.properties android/
          cp /tmp/tempproject/android/build.gradle android/
          cp /tmp/tempproject/android/settings.gradle android/
          cp /tmp/tempproject/android/app/build.gradle android/app/
          cp /tmp/tempproject/android/app/src/main/res -r android/app/src/main/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: multidroid-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30
