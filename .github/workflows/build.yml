name: Build MultiDroid APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project
        run: |
          flutter create --org com.multidroid --project-name multidroid /tmp/tempproject
          cp -r /tmp/tempproject/android/gradle android/
          cp /tmp/tempproject/android/gradle.properties android/
          cp /tmp/tempproject/android/settings.gradle android/
          cp -r /tmp/tempproject/android/app/src/main/res android/app/src/main/

      - name: Write build.gradle
        run: |
          cat > android/build.gradle << 'GRADLE'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url "https://jitpack.io" }
              }
          }
          GRADLE

      - name: Write app/build.gradle
        run: |
          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.multidroid.app"
              compileSdk 34
              defaultConfig {
                  applicationId "com.multidroid.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          flutter {
              source "../.."
          }
          dependencies {
              implementation "dev.rikka.shizuku:api:13.1.5"
              implementation "dev.rikka.shizuku:provider:13.1.5"
          }
          GRADLE

      - name: Fix Kotlin version
        run: |
          sed -i "s/kotlin(\"jvm\") version \"[^\"]*\"/kotlin(\"jvm\") version \"1.9.22\"/" android/settings.gradle
          sed -i "s/kotlin-android.*version.*\"[^\"]*\"/kotlin-android\" version \"1.9.22\"/" android/settings.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: multidroid-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 30
